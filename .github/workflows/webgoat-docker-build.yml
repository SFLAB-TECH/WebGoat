name: Build WebGoat Docker Image (self-hosted)

# self-hosted runner에서 WebGoat를 빌드해 로컬 도커에 이미지를 남깁니다.
# 레지스트리 push 없음 → 러너 머신의 docker images 에 바로 적재됩니다.

on:
  workflow_dispatch:        # Actions 탭에서 수동 실행 가능

jobs:
  build:
    runs-on: [self-hosted, linux, x64]   # SYKWON 러너 라벨

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # 1. JDK 환경 설정 (호스트의 기본 캐시 기능은 오염을 방지하기 위해 사용하지 않음)
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"   # pom.xml 의 <java.version> 및 Dockerfile과 일치

      # 2. 깨진 로컬 캐시 전면 초기화 및 Maven 빌드
      - name: Nuke Corrupted Maven Cache & Build JAR
        # 특정 플러그인 폴더만 지우면 다른 플러그인(jar-plugin 등)에서 계속 터지므로, 
        # .m2/repository 전체를 시원하게 밀어버린 뒤 완전 깨끗한 상태에서 새 의존성을 받습니다.
        run: |
          echo "Cleaning up corrupted Maven repository..."
          rm -rf /home/sflab/.m2/repository
          
          echo "Starting clean Maven package..."
          ./mvnw --batch-mode --no-transfer-progress clean package -Dmaven.test.skip=true -U

      # 3. 호스트에서 생성된 target/ 내의 JAR 파일을 가지고 Docker 이미지 빌드
      - name: Build Docker image (local only, no push)
        run: |
          docker build \
            -t webgoat:latest \
            -t webgoat:${{ github.sha }} \
            -f ./Dockerfile .

      # 4. 결과물 확인
      - name: Show built image
        run: docker images webgoat

      # 5. .tar 저장
      - name: Container Image Tar Save
        run: docker save -o /home/sflab/workspace/target_image/webgoat.tar webgoat:latest

      # 6. Black Duck SCA 컨테이너 이미지 스캔 단계 추가
      - name: Black Duck Security Scan
        uses: blackduck-inc/black-duck-security-scan@v2.10.0
        env:
          # 가이드라인에 명시된 DETECT 환경 변수 주입 방식을 사용합니다.
          # 소스 코드 검사를 패스하고 타르볼 레이어만 스캔하도록 설정을 주입합니다.
          DETECT_PROJECT_NAME: "(SY)TEST"
          DETECT_PROJECT_VERSION_NAME: "GH_Container"
          DETECT_CONTAINER_SCAN_FILE_PATH: "/home/sflab/workspace/target_image/webgoat.tar"
          DETECT_TOOLS: "CONTAINER_SCAN"
          BLACKDUCK_TRUST_CERT: TRUE
        with:
          ### SCANNING: Required fields (v2 신규 규격 이름 반영) ###
          blackducksca_url: ${{ secrets.BLACKDUCK_URL }}      # (혹은 설정에 따라 vars.BLACKDUCK_URL)
          blackducksca_token: ${{ secrets.BLACKDUCK_TOKEN }}
            
        
