name: Build and Push WebGoat Docker Image

# 방법 2(소스에서 직접 빌드)를 CI로 옮긴 워크플로입니다.
# 1) JDK 셋업 → 2) Maven으로 JAR 빌드 → 3) Docker 이미지 빌드 → 4) GHCR push

on:
  push:
    branches: [main, master]
    tags: ["v*"]            # v1.2.3 같은 태그 push 시에도 빌드
  pull_request:
    branches: [main, master]
  workflow_dispatch:        # Actions 탭에서 수동 실행 가능

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # 예: my-org/WebGoat

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write       # GHCR push 권한

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "23"
          cache: maven       # ~/.m2 캐싱으로 빌드 가속

      - name: Build JAR with Maven (skip tests)
        run: ./mvnw --batch-mode --no-transfer-progress clean package -DskipTests

      - name: Log in to GHCR
        # PR에서는 push하지 않고 빌드만 검증 (포크 PR엔 쓰기 권한 없음)
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile          # WebGoat 저장소 루트의 Dockerfile 사용
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
