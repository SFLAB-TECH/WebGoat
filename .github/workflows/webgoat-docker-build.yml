name: Build WebGoat Docker Image (self-hosted)

# self-hosted runner에서 WebGoat를 빌드해 로컬 도커에 이미지를 남깁니다.
# 레지스트리 push 없음 → 러너 머신의 docker images 에 바로 적재됩니다.

on:
  # push:
  #   branches: [main, master]
  workflow_dispatch:        # Actions 탭에서 수동 실행 가능

jobs:
  build:
    runs-on: [self-hosted, linux, x64]   # SYKWON 러너 라벨

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"   # pom.xml 의 <java.version> 과 일치
          cache: maven

      - name: Build JAR with Maven (skip tests)
        run: ./mvnw --batch-mode --no-transfer-progress clean package -Dmaven.test.skip=true -U

      - name: Build Docker image (local only, no push)
        run: |
          docker build \
            -t webgoat:latest \
            -t webgoat:${{ github.sha }} \
            -f ./Dockerfile .

      - name: Show built image
        run: docker images webgoat
